    ### Composition Definition
    
    A Composition is a Helm Chart archive (.tgz) with a JSON Schema for the values.yaml file. The JSON Schema file must be named values.schema.json.
    
    Our official tool to generate a valid JSON schemas is krateoctl.
    
    ### Security Features
    
    - Generates CRDs based on the chart's schema, preventing invalid configurations
    - Deploys composition-dynamic-controller with minimal necessary permissions
    - Removes RBAC policies upon deletion of the CR
    - Implements mutating webhook and conversion webhook for enhanced security and flexibility
    
    ### Best Practices
    
    - Always include a values.schema.json file in your Helm charts
    - Use the krateo.io/paused annotation to manage composition lifecycle
    - Leverage the multi-version support for smooth upgrades and rollbacks
    
    ### Comprehensive Deployment Guide
    
    The Krateo V2 Template Fireworks App provides a complete solution for deploying and managing fireworks applications on Kubernetes using Krateo's Composition system. This guide covers the entire lifecycle from initial deployment to advanced management scenarios.
    
    ####  Initial Setup
    
    ##### 1. Adding Krateo Helm Repository
    ```bash
    helm repo add krateo https://charts.krateo.io
    ```
    
    ##### 2. Updating Helm Repositories
    ```bash
    helm repo update krateo
    ```
    
    ##### 3. Install required providers:
       ```bash
       helm install github-provider krateo/github-provider --namespace krateo-system
       helm install git-provider krateo/git-provider --namespace krateo-system
       helm install argocd argo/argo-cd --namespace krateo-system --create-namespace --wait
       ```
    These installations set up the necessary providers for GitHub and ArgoCD, enabling integration with your deployment process of the fireworks application.
    
    
    #### CompositionDefinition Deployment
    
    ##### 1. Creating the Application Namespace
    ```bash
    kubectl create namespace fireworksapp-system
    ```
    
    ##### 2. Deploying the CompositionDefinition
    ```bash
    cat <<EOF | kubectl apply -f -
    apiVersion: core.krateo.io/v1alpha1
    kind: CompositionDefinition
    metadata:
      name: fireworksapp-cd
      namespace: fireworksapp-system
    spec:
      chart:
        repo: fireworks-app
        url: https://charts.krateo.io
        version: 1.1.13
    EOF
    ```
    
    #### 3. Verifying CompositionDefinition Status
    ```bash
    kubectl wait compositiondefinition fireworksapp-cd --for condition=Ready=True --namespace fireworksapp-system --timeout=600s
    ```
    
    #### Creating Compositions
    
    ##### 1. Setting Up GitHub Credentials
    ```bash
    kubectl create secret generic github-repo-creds \
      --namespace krateo-system \
      --from-literal=token=YOUR_GITHUB_TOKEN
    ```
    
    ##### 32. Creating the FireworksApp Instance
    
    ```bash
    cat <<EOF | kubectl apply -f -
    apiVersion: composition.krateo.io/v1-1-13
    kind: FireworksApp
    metadata:
      name: fireworksapp-composition-1
      namespace: fireworksapp-system
    spec:
      app:
        service:
          port: 31180
          type: NodePort
      argocd:
        application:
          destination:
            namespace: fireworks-app
            server: https://kubernetes.default.svc
          project: default
          source:
            path: chart/
          syncPolicy:
            automated:
              prune: true
              selfHeal: true
        namespace: krateo-system
      git:
        fromRepo:
          branch: main
          credentials:
            authMethod: generic
            secretRef:
              key: token
              name: github-repo-creds
              namespace: krateo-system
          name: krateo-v2-template-fireworksapp
          org: krateoplatformops
          path: skeleton/
          scmUrl: https://github.com
        insecure: true
        toRepo:
          apiUrl: https://api.github.com
          branch: main
          credentials:
            authMethod: generic
            secretRef:
              key: token
              name: github-repo-creds
              namespace: krateo-system
          initialize: true
          org: your-organization
          name: fireworksapp-test-v2
          path: /
          private: false
          scmUrl: https://github.com
        unsupportedCapabilities: true
    EOF
    ```
    
    **What Occurs:**
    - Krateo creates a new FireworksApp resource
    - The controller begins provisioning the application
    - ArgoCD is configured to manage the deployment
    - A new GitHub repository is created (if specified)
    
    ## Composition Dynamic Controller
    
    The composition-dynamic-controller is an operator that is instantiated by the core-provider to manage the Custom Resources whose Custom Resource Definition is generated by the core-provider.
    
    ### Composition Dynamic Controller (CDC) & Chart Inspector: Secure Helm Lifecycle Management
    
    The Composition Dynamic Controller (CDC) is a specialized Kubernetes operator that orchestrates the end-to-end lifecycle of Krateo compositions. Acting as the reconciliation engine for Composition custom resources, it bridges declarative application definitions with Helm’s packaging system through intelligent automation. The Chart Inspector serves as its "safety advisor," enabling proactive decision-making via dry-run analysis.
    
    ### Core CDC Workflow (with Chart Inspector Integration)
    
    #### Reconciliation Trigger
    
    - Watches for changes to Composition CRs or Helm chart versions.
    - Invokes the Chart Inspector to simulate installations/upgrades before execution.
    
    #### Dry-Run Analysis Phase (Chart Inspector)
    
    `helm install --dry-run=server <chart> --version <ver>  # Returns:`
    
    - Resource Manifest List: All Kubernetes objects (Deployments, CRDs, etc.) the chart would create along with filename to .
    - Dependency Graph: Order of operations (e.g., CRDs before custom resources).
    
    #### RBAC Auto-Provisioning (CDC)
    
    - Dynamically generates least-privilege Roles/ClusterRoles based on the Inspector’s output.
    - Ensures the CDC’s service account has exactly the permissions needed—no more, no less.
    
    #### Atomic Execution (CDC)
    
    Proceeds with helm install/upgrade only after successful dry-run and RBAC setup.
    
    ### Why This Architecture Matters
    
    - Safety Net
        The Chart Inspector’s dry-run prevents "helm surprises" (e.g., undeclared CRD creations or namespace pollution).
        Example: Blocks a chart upgrade if the new version requires a ClusterRole the CDC isn’t authorized to manage.
    
    - GitOps Compliance
        The CDC enforces declarative intent by reconciling against the dry-run’s output, not just Helm’s last-applied state.
        Self-healing kicks in if manual changes violate the composition’s definition.
    
    - Multi-Tenancy Ready
        RBAC is scoped per-composition, isolating teams/projects.
        The Inspector’s resource listing ensures no cross-tenant leakage (e.g., a composition can’t create resources in forbidden namespaces).
    
    ### Real-World Example: Handling a Breaking Chart Change
    
    - Scenario: A Helm chart v1.2.0 introduces a new CustomResourceDefinition (CRD).
    - CDC+Inspector Flow:
        Dry-run detects the new CRD and its required API group permissions.
        CDC creates a ClusterRole granting create/get/list for the CRD.
        Upgrade proceeds only after the CRD and RBAC are confirmed active.
    - Result: Zero downtime; no "helm upgrade failed: CRD missing" errors.
    
    ### `gracefullyPaused` Values
    
    The global.gracefullyPaused value provides a way to gracefully pause both the composition resource and all Krateo resources within its Helm chart.
    How it works:
    
    - Trigger: Set the annotation krateo.io/gracefully-paused on the composition resource
    - Activation: The pause takes effect only after the next successful Helm upgrade injects this value into the chart
    - Scope: Pauses both the composition reconciliation AND any Krateo resources in the chart that respect the krateo.io/paused annotation
    
    Use cases:
    
    - Graceful pause: Temporarily halt all composition-related activity without resource deletion
    - Coordinated pause: Ensure both the composition and its managed resources pause simultaneously
    - Safe maintenance: Pause operations during maintenance windows
    
    Comparison with krateo.io/paused:
    
    Annotation | Scope | When it takes effect
    krateo.io/gracefully-paused | Composition + chart resources | After next Helm upgrade
    krateo.io/paused | Composition only | Immediately
    
    Example: Use krateo.io/gracefully-paused when you need to pause an entire application stack, or krateo.io/paused for immediate composition-only pausing.
    
    How to include the pause in a resource included in the chart
    To include the pause in a resource included in the chart, you can use the krateo.io/paused annotation on the resource. This will ensure that the resource is paused when the composition is paused.
    
    ```
    apiVersion: git.krateo.io/v1alpha1
    kind: Repo
    metadata:
      name: {{ include "fireworks-app.fullname" . }}-repo
      labels:
        {{- include "fireworks-app.labels" . | nindent 4 }}
      annotations:
        krateo.io/paused: "{{ default false (and .Values.global .Values.global.gracefullyPaused) }}"
    spec:
    ...
    ```
    
    ## provider-runtime
    
    The third component of Krateo Composable Operations (KCO) in Krateo PlatformOps is the 𝘱𝘳𝘰𝘷𝘪𝘥𝘦𝘳-𝘳𝘶𝘯𝘵𝘪𝘮𝘦 (https://github.com/krateoplatformops/provider-runtime), our production-grade version of the controller-runtime (https://github.com/kubernetes-sigs/controller-runtime). Both runtimes can be used to implement Kubernetes operators.
    
    What more have we added to the provider-runtime compared to the controller-runtime? Three features:
    
    - 𝘱𝘢𝘶𝘴𝘪𝘯𝘨 𝘵𝘩𝘦 𝘳𝘦𝘤𝘰𝘯𝘤𝘪𝘭𝘪𝘢𝘵𝘪𝘰𝘯 𝘰𝘧 𝘵𝘩𝘦 𝘊𝘶𝘴𝘵𝘰𝘮 𝘙𝘦𝘴𝘰𝘶𝘳𝘤𝘦: the use case is in which the infrastructure that exposes the API to the Operator has anomalies that lead to maintenance (planned or extraordinary), and you want to prevent the Operator from bombarding the API with unnecessary calls.
    
    - 𝘪𝘯𝘩𝘪𝘣𝘪𝘵𝘪𝘯𝘨 𝘰𝘯𝘦 𝘰𝘳 𝘮𝘰𝘳𝘦 𝘣𝘦𝘩𝘢𝘷𝘪𝘰𝘳𝘴 𝘰𝘧 𝘵𝘩𝘦 𝘊𝘶𝘴𝘵𝘰𝘮 𝘙𝘦𝘴𝘰𝘶𝘳𝘤𝘦: the example is when I want to prevent the deletion (deliberate or by mistake) of the Custom Resource in the production environment from also deleting the physical resource managed by the Operator. Another example is when I want to import a resource created before using an operator into Kubernetes.
    
    - 𝘧𝘰𝘳𝘤𝘪𝘯𝘨 𝘵𝘩𝘦 𝘸𝘳𝘪𝘵𝘪𝘯𝘨 𝘰𝘧 𝘢 𝘒𝘶𝘣𝘦𝘳𝘯𝘦𝘵𝘦𝘴 𝘦𝘷𝘦𝘯𝘵 𝘢𝘵 𝘦𝘢𝘤𝘩 𝘤𝘩𝘢𝘯𝘨𝘦 𝘰𝘧 𝘤𝘰𝘯𝘥𝘪𝘵𝘪𝘰𝘯. A Kubernetes event contains valuable information that lets you understand what happened, when, and who detected a change of condition in the managed resource (https://www.cncf.io/blog/2023/03/13/how-to-use-kubernetes-events-for-effective-alerting-and-monitoring/). Although extremely useful, an Operator does not necessarily write a Kubernetes event at every change of condition. Our provider runtime instead forces us to write an event.
    
    # Krateo Composable Portal
    
    If more information are needed, transfer the control to the `portal_agent`.
    
    ## Frontend
    
    In Krateo Composable Portal everything is based on the concept of widgets and their composition, a widget is a k8s CRD that maps to a UI element in the frontend (eg a Button) or to a configuration used by other widget (eg a Route)
    
    ## widgetData
    
    Every widget has a widgetData property that contains data used to control how the widget looks like or behave in the Frontend Composable Portal, in this example we are defining a label, an icon (using fontawesome naming convention) and a type that control the the visual style of the button, in the button API references can be seen all possible values.
    
    Let's explore a basic Button widget
    
    ```
    # button.yaml
    kind: Button
    apiVersion: widgets.templates.krateo.io/v1beta1
    metadata:
      name: button-1
      namespace: krateo-system
    spec:
      widgetData:
        label: This is a button
        icon: fa-sun
        type: primary
    ```
    
    ## widgetDataTemplate
    
    Every widget supports the property spec.widgetDataTemplate that allows overriding a specific value defined in spec.widgetData, this is useful to inject dynamic content inside a widget.
    
    ```
    widgetDataTemplate:
        - forPath: data
        expression: ${ .namespaces }
    ```
    
    widgetDataTemplate accepts an array of objects with forPath and expression keys.
    forPath is used to chose what key in widgetData to override, it uses dot notation to reference nested data eg parentProperty.childProperty
    expression is a jq expression that uses the result of the jq expression as the data to be injected in the specified path.
    
    ## Simple example
    
    In the example below, the label of the button will be the date when the widget is loaded, as the data from widgetDataTemplate is substituted dynamically at the moment of loading a widget
    
    ```
    kind: Button
    apiVersion: widgets.templates.krateo.io/v1beta1
    metadata:
      name: button-post-nginx
      namespace: krateo-system
    spec:
      widgetData:
        label: button 1
        icon: fa-rocket
        type: primary
      widgetDataTemplate:
        - forPath: label
          expression: ${ now | strftime("%Y-%m-%d") }
    ```
    
    # Krateo Composable FinOps
    
    The Krateo Composable FinOps module is a tool to collect costs and metrics from service providers and on-premises systems, to allow for the showback and optimization of resource utilization. The metrics collected include the costs, but also utilization of resources such as CPU, memory, and also carbon intensity, but this list could include any type of metric that we want to optimize for that is exposed through an API.
    
    The architecture relies on the concept of exporters and scrapers, a duo of applications that is tasked with collecting information from an API source, exporting it, and then scraping it for storage and later utilization. The exporter is basically a webservice that exposes an endpoint where data can be read from in a certain format, in this case, Prometheus'. The scraper, instead, is a service that connects to the exporter and collects all the data (i.e., by scraping it) and then querying the database to store it.
    
    The cost data is stored in the FinOps Cost and Usage Specification, FOCUS. It is a data representation that can show in a single view costs, discounts, commitments and usage, allowing to reduce significantly the overhead of data storage and analysis compared to traditional methods. It is also widely adopted and available in all major cloud service providers (e.g., Azure, GCP, AWS and Tencent cloud).
    
    The usage data is also stored in the database, however, usages are usually timeseries data, which allow analysis, pattern recognition and forecasting to be done on it to gain useful insights.
    
    ## Data Collection
    
    The first part of the module is responsible for data collection. This module is composed by the following units:
    - finops-data-types
    - finops-operator-exporter
    - finops-operator-exporter-chart
    - finops-operator-scraper
    - finops-operator-scraper-chart
    - finops-operator-focus
    - finops-operator-focus-chart
    - finops-database-handler
    - finops-database-handler-chart
    - finops-prometheus-exporter-generic
    - finops-prometheus-resource-exporter-azure
    - finops-prometheus-scraper-generic
    
    ## Data Presentation
    
    The second module is responsible for the showback of data inside Krateo's frontend. It includes one main module:
    
    - finops-composition-definition-parser
    - finops-composition-definition-parser-chart
    
    Additionally, as an example application or use case, there is the Azure pricing API plugin for KOG/RDC and its composition for automatic pricing upload:
    
    - azure-pricing-rest-dynamic-controller-plugin
    - azure-pricing-rest-dynamic-controller-plugin-chart
    - focus-data-presentation-azure
    
    This component allows to show pricing information on the frontend cards through API calls to the finops-database-handler notebooks. The full example can be found here: Krateo FinOps Example Composition
    
    ## Optimization
    
    The third module is responsible for optimizations, and a usage example is available in the Krateo FinOps Example Composition.
    
    The optimizations rely on Open Policy Agent (OPA). The instances of this composition definition will install it automatically through the finops-webhook-template-chart, which is imported as a dependency. The composition relies on the OPA policies in finops-moving-window-policy to call the endpoint of the finops-moving-window-optimization-microservice. The policy mutates the composition through the finops-webhook-template to add the optimization to the field spec.optimization, which is then displayed in the frontend.
    
    The policy is triggered by a CronJob running periodically (every day by default) that labels the Composition resource with a label optimization that has as the value the timestamp with the last optimization request.
    
    The modules involved are:
    - opa
    - policies
    - finops-moving-window-microservice
    - finops-moving-window-microservice-chart
    - finops-webhook-template-chart
    
    ## Summary of Functionality
    
    The complete flow of the architecture starts with the creation of a generic composition definition that includes FinOps tags and custom resources. When a new composition definition is created, it is immediately parsed by the finops-composition-definition-parser looking for resource annotations that will be used to connect the custom resources created with pricing information stored in the database. If pricing information is available, then it is displayed inside the frontend.
    
    Then, when actually creating a composition, a mutating webhook gets called to apply a set of OPA policies which will perform several evaluations to decide how to best deploy the requested resources. These policies are split between "day 1" and "day 2". Day 1 policies are applied when the mutating webhook is called for a CREATE. Day 2 policies are applied when the mutating webhook is called for an UPDATE. These types of policies represent any kind of optimization or algorithm that needs to be applied to the resources. The UPDATE events are triggered by actual resources updates or through a periodic cronjob, part of the composition definition. The policies can include any type of call or data, including custom performance targets or particular optimization objectives/functions.
    
    An example "day 1" policy is the selection of the best time and location to minimize carbon intensity for a Virtual Machine (VM). This algorithm relies on a scheduler and forecaster. The forecaster runs periodically (triggered by the scheduler or through a periodic job) and predicts a window of data for each region of interest. The chosen model, TTMs, is extremely efficient and its inference can be executed hundreds of times per second on a single GPU. The forecasted data is then stored in the database (i.e., CrateDB in Krateo). The scheduler reads the data and, based on the forecasting, decides when and where to deploy the VM to minimize carbon intensity. Once decided, the mutating webhook finishes and the resource is mutated with the time and region. Then, the composition dynamic controller will create the resource at the right time in the selected region. The resource will be actually created by a dedicated service provider operator (e.g., Azure, AWS or GCP).
    
    An Example "day 2" policy is implemented in finops-moving-window-policy with the moving window algorithm, which searches in the usage patterns of deployed virtual machines to find wasted resources.
    
    The creation of the composition will also include the resources for the finops-operator-exporter, which will allow the collection of metrics for the resources created. This will allow the forecaster to work on the actual data to create more "ad-hoc" predictions for each resource. Also, this creates a feedback optimization system, that should ideally stabilize on the ideal amount of resources to reach the target objective.
    
    ## finops-operator-exporter
    
    This repository is part of the wider exporting architecture for the Krateo Composable FinOps and manages the exporting from API endpoints of FOCUS cost reports.
    
    ### Overview
    This finops-operator-exporter is tasked with the creation of a generic exporting pipeline, according to the description given in a Custom Resource (CR). After the creation of the CR, the operator reads the "exporting" configuration and creates three resources: a deployment with a generic prometheus exporter inside, a configmap containing the exporter configuration CR and a service that exposes the deployment. The given endpoint is supposed to be a CSV file containing a FOCUS report. Then, it creates a new CR for the FinOps Operator Scraper, which starts a generic scraper to upload the data to a database. The configmap is mounted as a volume inside the deployment and the service is used to expose the metrics collected by the exporter in the prometheus format.
    
    ### Examples
    
    ```yaml
    apiVersion: finops.krateo.io/v1
    kind: DatabaseConfig
    metadata:
      name: # DatabaseConfig name
      namespace: # DatabaseConfig namespace
    spec:
      username: # username string
      passwordSecretRef: # object reference to secret with password
        name: # secret name
        namespace: # secret namespace
        key: # secret key
    ---
    apiVersion: finops.krateo.io/v1
    kind: ExporterScraperConfig
    metadata:
      name: # ExporterScraperConfig name
      namespace: # ExporterScraperConfig namespace
    spec:
      exporterConfig: # same as krateoplatformops/finops-prometheus-exporter-generic
        api: # the API to call
          path: # the path inside the domain
          verb: GET # the method to call the API with
          endpointRef: # secret with the url in the format http(s)://host:port, it can contain variables, such as http://<varName>.com:<envExample>, which will be compiled with the additionalVariables fields
            name: 
            namespace:
        # metricType: # optional, one of: cost, resource; default value: cost
        pollingInterval: # time duration, e.g., 12h30m
        additionalVariables:
          varName: sample
          # Variables whose value only contains uppercase letters are taken from environment variables
          # FROM_THE_ENVIRONMENT must be the name of an environment variable inside the target exporter container (e.g., kubernetes services)
          envExample: FROM_THE_ENVIRONMENT
      scraperConfig: # same fields as krateoplatformops/finops-prometheus-scraper-generic
        tableName: # tableName in the database to upload the data to
        # api: # api to the exporter, optional (if missing, it uses the exporter)
        pollingInterval: # time duration, e.g., 12h30m
        scraperDatabaseConfigRef: # See above kind DatabaseConfig
          name: # name of the databaseConfigRef CR 
          namespace: # namespace of the databaseConfigRef CR
    ``` 
    
    If the field metricType is set to cost, then the API in url must expose a FOCUS report in a CSV file. Otherwise, if set to resource, it must expose usage metrics according to the JSON/OPENAPI schema in the folder resources and the field additionalVariables must contain a field ResourceId with the identifier of the resources to be used in the database as external key to reference the cost metric from the usage metric (i.e., the same as the field resourceId of the focusConfig CR).
    
    The field spec.scraperConfig.api can be left empty if the exporter and scraper are both configured. The operator will compile this field automatically.
    
    #### Example Use Case for Pricing Visualization
    
    The Composable FinOps can be used to display pricing in the Krateo Composable Portal cards through a dedicated composition. You can find out more here: krateo-v2-template-finops-example-pricing-vm-azure.
    
    ### Configuration
    
    To start the exporting process, see the examples section. The configuration sample includes the database-config CR.
    
    The exporter container is created in the namespace of the CR. The exporter container looks for a secret in the CR namespace called registry-credentials, configurable in the HELM chart.
    
    The FOCUS data needs to be in the CSV format and the Tags column has to use the following format:
    
    `"CostCenter": "1234","Cost department": "Marketing","env": "prod","org": "trey","Project": "Foo"`
    
    ## finops-operator-scraper
    
    This repository is part of the wider exporting architecture for the Krateo Composable FinOps and manages the creation of the scrapers reading the FOCUS cost reports from the Prometheus Exporters.
    
    ### Overview
    This component is tasked with the creation of a generic scraper, according to the description given in a Custom Resource (CR). After the creation of the CR, the operator reads the "scraper" configuration part and creates two resources: a deployment with a generic prometheus scraper inside and a configmap containing the configuration. The scraper parses the prometheus data and obtains the given database-config to upload all metrics to a database.
    
    ### Examples 
    
    ```yaml
    apiVersion: finops.krateo.io/v1
    kind: DatabaseConfig
    metadata:
      name: # DatabaseConfig name
      namespace: # DatabaseConfig namespace
    spec:
      username: # username string
      passwordSecretRef: # object reference to secret with password
        name: # secret name
        namespace: # secret namespace
        key: # secret key
    ---
    apiVersion: finops.krateo.io/v1
    kind: ScraperConfig
    metadata:
      name: # ScraperConfig name
      namespace: # ScraperConfig namespace
    spec:
      scraperConfig:
        tableName: # tableName in the database to upload the data to
        api: # the API to call with the prometheus exporter
          path: # the path inside the domain
          verb: GET # the method to call the API with
          endpointRef: # secret with the url in the format http(s)://host:port
            name: 
            namespace:
        pollingInterval: # time duration, e.g., 12h30m
        scraperDatabaseConfigRef: # See above kind DatabaseConfig
          name: # name of the databaseConfigRef CR 
          namespace: # namespace of the databaseConfigRef CR
    ```
    
    #### Example Use Case for Pricing Visualization
    The Composable FinOps can be used to display pricing in the Krateo Composable Portal cards through a dedicated composition. You can find out more here: krateo-v2-template-finops-example-pricing-vm-azure.
    
    ## finops-operator-focus
    
    This repository is part of the wider exporting architecture for the Krateo Composable FinOps and manages custom costs in the FOCUS format
    
    ### Overview
    This component is tasked with the creation of a generic exporting pipeline, according to the description given in a Custom Resource (CR). After the creation of the CR, the operator reads the FOCUS fields and creates a new resource for the FinOps Operator Exporter, pointing the api field at the Kubernetes API server and the FOCUS custom resource. This allow to create an exporter that reads directly the custom resource. The FinOps Operator Exporter then continues with the creation of the all the required resources, such as deployments, configMaps, services, and the CR for the FinOps Operator Scraper that manages scraping.
    
    ### Examples 
    
    ```yaml
    apiVersion: finops.krateo.io/v1
    kind: DatabaseConfig
    metadata:
      name: # DatabaseConfig name
