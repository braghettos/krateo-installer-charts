  description: "Translates Ansible playbooks into Kubernetes operators using the Operator SDK Ansible Operator path"
  declarative:
    deployment:
      env:
        - name: GOOGLE_GENAI_USE_VERTEXAI
          value: "0"
    modelConfig: {{ .Values.agents.ansibleToOperator.modelConfig }}
    stream: true
    a2aConfig:
      skills:
        - id: ansible-to-operator
          name: "Ansible to Kubernetes Operator"
          description: "Converts Ansible playbooks/roles into Operator SDK Ansible-based operators"
          tags: [ansible, operator-sdk, kubernetes, code-generation]
    promptTemplate:
      dataSources:
        - kind: ConfigMap
          name: krateo-prompts-{{ .Values.prompts.language }}
          alias: prompts
    systemMessage: |
