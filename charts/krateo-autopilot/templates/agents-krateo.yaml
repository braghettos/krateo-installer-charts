{{- if .Values.agents.auth.enabled }}
apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: krateo-auth-agent
  namespace: {{ .Values.namespace }}
spec:
  type: Declarative
  description: "Manages Krateo authentication: LDAP, OIDC, OAuth 2.0, and basic auth"
  declarative:
    deployment:
      env:
{{- include "krateo-autopilot.genaiEnv" . | nindent 8 }}
    modelConfig: {{ .Values.agents.auth.modelConfig }}
    stream: true
    promptTemplate:
      dataSources:
        - kind: ConfigMap
          name: krateo-prompts-{{ .Values.prompts.language }}
          alias: prompts
    systemMessage: |
      {{`{{include "prompts/auth_agent"}}`}}
{{- end }}
---
{{- if .Values.agents.blueprint.enabled }}
apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: krateo-blueprint-agent
  namespace: {{ .Values.namespace }}
spec:
  type: Declarative
  description: "Manages Krateo blueprints (CompositionDefinitions), compositions, and marketplace"
  declarative:
    deployment:
      env:
{{- include "krateo-autopilot.genaiEnv" . | nindent 8 }}
    modelConfig: {{ .Values.agents.blueprint.modelConfig }}
    stream: true
    promptTemplate:
      dataSources:
        - kind: ConfigMap
          name: krateo-prompts-{{ .Values.prompts.language }}
          alias: prompts
    systemMessage: |
      {{`{{include "prompts/blueprint_agent"}}`}}
    tools:
      - type: McpServer
        mcpServer:
          apiGroup: kagent.dev
          kind: RemoteMCPServer
          name: krateo-blueprint-tools
      - type: McpServer
        mcpServer:
          apiGroup: kagent.dev
          kind: RemoteMCPServer
          name: github-mcp-server
          toolNames:
            - create_repository
            - create_or_update_file
            - push_files
            - get_file_contents
            - search_repositories
{{- end }}
