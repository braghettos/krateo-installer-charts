---
{{- if .Values.agents.observability.enabled }}
apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: krateo-observability-agent
  namespace: {{ .Values.namespace }}
spec:
  type: Declarative
  description: "Troubleshoots Krateo and Kubernetes issues by analyzing telemetry from ClickHouse"
  declarative:
    deployment:
      env:
{{- include "krateo-autopilot.genaiEnv" . | nindent 8 }}
    modelConfig: {{ .Values.agents.observability.modelConfig }}
    stream: true
    promptTemplate:
      dataSources:
        - kind: ConfigMap
          name: krateo-prompts-{{ .Values.prompts.language }}
          alias: prompts
    systemMessage: |
      {{`{{include "prompts/observability_agent"}}`}}
    tools:
      - type: McpServer
        mcpServer:
          apiGroup: kagent.dev
          kind: RemoteMCPServer
          name: clickhouse-mcp-server
      - type: McpServer
        mcpServer:
          apiGroup: kagent.dev
          kind: RemoteMCPServer
          name: kagent-tool-server
          toolNames:
            - k8s_get_resources
            - k8s_describe_resource
            - k8s_get_events
            - k8s_get_pod_logs
{{- end }}
