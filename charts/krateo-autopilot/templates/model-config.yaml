{{- /*
  ModelConfigs for the autopilot agents.

  vertexAI.enabled=true  -> provider GeminiVertexAI with the geminiVertexAI block
    (projectID + location). No apiKeySecret: kagent authenticates to Vertex via
    Application Default Credentials (the GKE node SA token from the metadata server).

  vertexAI.enabled=false -> provider Gemini with the apiKeySecret (Gemini API key).
*/}}
{{- range $alias, $m := .Values.models }}
apiVersion: kagent.dev/v1alpha2
kind: ModelConfig
metadata:
  name: {{ $m.name }}
  namespace: {{ $.Values.namespace }}
spec:
  model: {{ $m.model }}
{{- if $.Values.vertexAI.enabled }}
  provider: GeminiVertexAI
  geminiVertexAI:
    projectID: {{ $.Values.vertexAI.projectID | quote }}
    location: {{ $.Values.vertexAI.location | quote }}
{{- else }}
  provider: {{ $m.provider }}
  apiKeySecret: {{ $.Values.geminiApiKey.secretName }}
  apiKeySecretKey: {{ $.Values.geminiApiKey.secretKey }}
{{- end }}
---
{{- end }}
