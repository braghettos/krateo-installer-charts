namespace: krateo-system

# Human-in-the-loop approval gate for mutating Kubernetes tools (k8s_apply_manifest,
# k8s_patch_resource, k8s_delete_resource, k8s_scale, ...). true (default, safe): the
# k8s-agent and autopilot pause for approval before changing the cluster. false: they
# execute remediations autonomously (no approval) — use for closed-loop automation.
hitlApproval: true

# Gemini API key secret — must already exist in the namespace
geminiApiKey:
  secretName: gemini-api-key
  secretKey: apiKey

# Model configurations
models:
  flash:
    name: gemini-flash
    model: gemini-2.5-flash
    provider: Gemini
  pro:
    name: gemini-pro
    model: gemini-2.5-pro
    provider: Gemini

# Gemini Vertex AI provider config.
# When enabled, ModelConfigs use provider GeminiVertexAI with Application Default
# Credentials (no API key / no SA-key file) — the kagent agent pods authenticate to
# Vertex via the GKE node SA token from the metadata server. The node pool's SA must
# have an IAM role covering aiplatform.* (e.g. roles/aiplatform.user or roles/editor)
# and the node pool must run with the cloud-platform OAuth scope.
vertexAI:
  enabled: false
  projectID: ""
  location: us-central1
  # secretName is only used for explicit SA-key auth; left unset for ADC.
  secretName: ""

# MCP servers — these are RemoteMCPServer CRDs pointing to existing deployments
mcpServers:
  clickhouse:
    enabled: true
    url: http://clickhouse-mcp-server.krateo-system:8000/mcp
    protocol: STREAMABLE_HTTP
  github:
    enabled: true
    url: http://github-mcp-server.krateo-system:3000/mcp
    protocol: STREAMABLE_HTTP

# Agents — enable/disable individual agents
agents:
  autopilot:
    enabled: true
    modelConfig: gemini-flash
    # Optional kagent skill OCI image (skills-init pulls it anonymously, so it must be a
    # public registry). Empty by default — set to your own skill image if you have one.
    skillRef: ""
  k8s:
    enabled: true
    modelConfig: gemini-flash
  helm:
    enabled: true
    modelConfig: gemini-flash
  auth:
    enabled: true
    modelConfig: gemini-flash
  blueprint:
    enabled: true
    modelConfig: gemini-flash
  documentation:
    enabled: true
    modelConfig: gemini-flash
  portal:
    enabled: true
    modelConfig: gemini-flash
  restaction:
    enabled: true
    modelConfig: gemini-flash
  observability:
    enabled: true
    modelConfig: gemini-flash
  codeAnalysis:
    enabled: true
    modelConfig: gemini-pro
  ansibleToOperator:
    enabled: true
    modelConfig: gemini-pro
  tfProviderToOperator:
    enabled: true
    modelConfig: gemini-pro
  tfToHelm:
    enabled: true
    modelConfig: gemini-pro

# Prompts language
prompts:
  language: eng
