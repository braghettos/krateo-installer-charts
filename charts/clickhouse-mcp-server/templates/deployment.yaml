apiVersion: apps/v1
kind: Deployment
metadata:
  name: clickhouse-mcp-server
  labels:
    app.kubernetes.io/name: clickhouse-mcp-server
    app.kubernetes.io/component: mcp-server
    app.kubernetes.io/part-of: krateo-observability-stack
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: clickhouse-mcp-server
  template:
    metadata:
      labels:
        app: clickhouse-mcp-server
        app.kubernetes.io/name: clickhouse-mcp-server
    spec:
      containers:
        - name: mcp-server
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: mcp
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            - name: CLICKHOUSE_HOST
              value: {{ .Values.clickhouse.host | quote }}
            - name: CLICKHOUSE_PORT
              value: {{ .Values.clickhouse.port | quote }}
            - name: CLICKHOUSE_SECURE
              value: {{ .Values.clickhouse.secure | quote }}
            - name: CLICKHOUSE_VERIFY
              value: {{ .Values.clickhouse.verify | quote }}
            - name: CLICKHOUSE_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.credentials.secretName }}
                  key: username
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.credentials.secretName }}
                  key: password
            - name: CLICKHOUSE_DATABASE
              value: {{ .Values.clickhouse.database | quote }}
            # Streamable-HTTP transport (serves /mcp) so kagent RemoteMCPServer
            # (protocol STREAMABLE_HTTP) can handshake it. The image's "sse" transport
            # serves /sse but kagent's SSE client 404s on the message write.
            - name: CLICKHOUSE_MCP_SERVER_TRANSPORT
              value: {{ .Values.transport | quote }}
            - name: CLICKHOUSE_MCP_BIND_HOST
              value: "0.0.0.0"
            - name: CLICKHOUSE_MCP_BIND_PORT
              value: {{ .Values.service.port | quote }}
          # TCP probe: the SSE transport serves /sse (a streaming endpoint), and /mcp
          # 404s — an httpGet probe would keep the pod NotReady and drop it from the
          # Service endpoints. Port-open is a reliable readiness signal here.
          livenessProbe:
            tcpSocket:
              port: {{ .Values.service.port }}
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: {{ .Values.service.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            # The upstream mcp/clickhouse:latest image runs as root and writes to its
            # working dir, so runAsNonRoot/readOnlyRootFilesystem are not enforced here.
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
