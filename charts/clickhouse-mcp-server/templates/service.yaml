apiVersion: v1
kind: Service
metadata:
  name: clickhouse-mcp-server
  labels:
    app.kubernetes.io/name: clickhouse-mcp-server
    app.kubernetes.io/part-of: krateo-observability-stack
spec:
  type: {{ .Values.service.type }}
{{- if .Values.service.sessionAffinity }}
  # Pin a client's Streamable-HTTP session to one pod so replicaCount can be > 1
  # without "400 No valid session ID" across round-robined pods.
  sessionAffinity: {{ .Values.service.sessionAffinity }}
{{- if .Values.service.sessionAffinityTimeoutSeconds }}
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: {{ .Values.service.sessionAffinityTimeoutSeconds }}
{{- end }}
{{- end }}
  selector:
    app: clickhouse-mcp-server
  ports:
    - name: mcp
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      protocol: TCP
