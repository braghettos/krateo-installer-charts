{{- if .Values.credentials.enabled }}
{{- /* ClickHouse credentials for the MCP server (read-only SELECT). */}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.credentials.secretName }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/component: mcp-server
    app.kubernetes.io/part-of: krateo-observability-stack
type: Opaque
stringData:
  username: {{ .Values.credentials.username | quote }}
  password: {{ .Values.credentials.password | quote }}
{{- end }}
{{- if .Values.endpointSecret.enabled }}
---
{{- /*
  Krateo endpointRef Secret for the ClickHouse HTTP interface, consumed by the
  portal composition-events RESTAction (replaces install.sh phase 4).
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.endpointSecret.secretName }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: krateo-observability-stack
type: Opaque
stringData:
  server-url: {{ .Values.endpointSecret.serverUrl | quote }}
{{- end }}
