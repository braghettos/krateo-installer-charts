{{- if .Values.otelCredentials.enabled }}
{{- /*
  Credentials the OTel collectors use to write to ClickHouse. Created in this
  release's namespace (krateo-system) — the same namespace the collector pods run
  in. Must match the ClickStack `otelcollector` ClickHouse user.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.otelCredentials.secretName }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/component: observability
    app.kubernetes.io/part-of: krateo-observability-stack
type: Opaque
stringData:
  username: {{ .Values.otelCredentials.username | quote }}
  password: {{ .Values.otelCredentials.password | quote }}
{{- end }}
