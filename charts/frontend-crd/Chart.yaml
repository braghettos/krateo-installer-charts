apiVersion: v2
name: frontend-crd
description: >-
  Krateo frontend widgets CRDs, as a Krateo composition. Thin dependency-WRAPPER over the UNFORKED upstream
  krateoplatformops frontend-crd chart (CRDs in templates/ -> helm-owned -> deleted on teardown). Adds
  only the values.schema.json core-provider requires. Dep aliased to `crds` so Helm's
  surfaced subchart key doesn't pascalize to this chart's Kind (FrontendCrd) and collide in crdgen.
  No fork.
type: application
version: 1.0.25
appVersion: "1.0.25"
dependencies:
  - name: frontend-crd
    alias: crds
    version: "1.0.25"
    repository: https://krateoplatformops.github.io/helm-charts
