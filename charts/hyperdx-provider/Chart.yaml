apiVersion: v2
name: hyperdx-provider
description: >-
  Generates a HyperDX operator using the Krateo operator generator
  (oasgen-provider). Ships two RestDefinitions — Webhook and Alert — that
  oasgen-provider turns into managed CRDs + controllers (Webhook/Alert plus their
  *Configuration resources) driving the HyperDX REST API. This replaces the
  imperative obs-stack pod-restart-alert/*.sh scripts with declarative resources.
type: application
version: 0.1.0
appVersion: "2.27.0"
