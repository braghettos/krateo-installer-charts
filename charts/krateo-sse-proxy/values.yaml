global: {}

replicaCount: 2

image:
  repository: ghcr.io/braghettos/krateo-sse-proxy
  tag: "0.1.0"
  pullPolicy: IfNotPresent

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""

service:
  type: ClusterIP
  port: 8080

clickhouse:
  url: "http://krateo-clickstack-clickhouse-clickhouse-headless.clickhouse-system.svc:8123"
  user: "default"
  passwordSecret:
    name: clickhouse-credentials
    key: password
    optional: true

listenAddr: ":8080"

resources:
  limits:
    cpu: 200m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 32Mi

podAnnotations: {}

nodeSelector: {}

tolerations: []

affinity: {}
